apiVersion: apps/v1
kind: Deployment
metadata:
  name: tentacular-mcp
  namespace: tentacular-system
  labels:
    app.kubernetes.io/name: tentacular-mcp
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tentacular-mcp
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tentacular-mcp
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: tentacular-mcp
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tentacular-mcp
          image: ghcr.io/randybias/tentacular-mcp:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TOKEN_PATH
              value: /etc/tentacular-mcp/token
          volumeMounts:
            - name: auth-secret
              mountPath: /etc/tentacular-mcp
              readOnly: true
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: auth-secret
          secret:
            secretName: tentacular-mcp-auth
