apiVersion: v2
name: tentacular-platform
description: Umbrella Helm chart for the complete Tentacular platform - deploys MCP server, PostgreSQL, NATS, esm-sh proxy, namespace management, and network policies in a single install
type: application
version: 0.1.0
appVersion: "0.2.0"

home: https://github.com/randybias/tentacular-mcp
sources:
  - https://github.com/randybias/tentacular-mcp
  - https://github.com/randybias/tentacular

maintainers:
  - name: Randy Bias
    url: https://github.com/randybias

keywords:
  - tentacular
  - mcp
  - platform
  - exoskeleton
  - kubernetes

# Subchart dependencies
dependencies:
  - name: postgresql
    # Multi-arch images (linux/amd64 + linux/arm64) verified for this version
    version: "16.7.27"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: nats
    # Multi-arch images (linux/amd64 + linux/arm64) - nats:2.11.10-alpine is multi-arch
    version: "1.3.16"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
  - name: cert-manager
    # Multi-arch images (linux/amd64 + linux/arm64) verified for this version
    version: "v1.17.4"
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: tentacular-mcp
    # Local reference for development; for releases use:
    # repository: oci://ghcr.io/randybias/tentacular-mcp/charts
    version: "0.1.0"
    repository: "file://../tentacular-mcp"
    condition: tentacular-mcp.enabled
