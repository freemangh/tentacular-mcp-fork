# -- Global settings shared across all subcharts
global:
  # -- Base domain for platform endpoints (e.g., tentacular.example.com)
  domain: ""
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- Namespace configuration
namespaces:
  system:
    # -- Create the system namespace (MCP server, platform control plane)
    create: true
    # -- Name of the system namespace
    name: tentacular-system
  exoskeleton:
    # -- Create the exoskeleton namespace (PostgreSQL, NATS, backing services)
    create: true
    # -- Name of the exoskeleton namespace
    name: tentacular-exoskeleton
  support:
    # -- Create the support namespace (esm-sh proxy, auxiliary services)
    create: true
    # -- Name of the support namespace
    name: tentacular-support

# -- Network policy configuration
networkPolicies:
  # -- Enable default-deny network policies with explicit allow rules
  enabled: true

# -- PostgreSQL subchart configuration (bitnami/postgresql)
postgresql:
  # -- Enable PostgreSQL deployment
  enabled: true
  # -- Deploy PostgreSQL into the exoskeleton namespace (must match namespaces.exoskeleton.name)
  namespaceOverride: tentacular-exoskeleton
  auth:
    # -- Database name for the tentacular platform
    database: tentacular
    # -- Admin username for provisioning per-tentacle roles and schemas
    username: tentacular_admin
    # -- Admin password (must be provided by user or via existingSecret)
    password: ""
    # -- Use an existing Secret for PostgreSQL credentials instead of password above
    existingSecret: ""
  primary:
    # -- Init scripts ConfigMap for bootstrapping admin role permissions
    initdb:
      scriptsConfigMap: tentacular-postgres-init
    persistence:
      # -- PVC size for PostgreSQL data
      size: 5Gi
      # -- Storage class (empty string uses cluster default)
      storageClass: ""

# -- NATS subchart configuration (nats/nats)
nats:
  # -- Enable NATS deployment
  enabled: true
  # -- Deploy NATS into the exoskeleton namespace (must match namespaces.exoskeleton.name)
  namespaceOverride: tentacular-exoskeleton
  config:
    jetstream:
      # -- Enable JetStream for persistent messaging
      enabled: true
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          # -- PVC size for JetStream file store
          size: 5Gi
          storageClassName: ""
    # -- Single replica (no clustering) for dev; enable cluster for production
    cluster:
      enabled: false
    # -- Token-based auth for NATS connections
    # JWT-based auth is planned for production
    merge:
      authorization:
        # -- NATS auth token (must be provided by user)
        token: ""
  # -- Disable NATS Box in platform deployment (not needed for tentacular)
  natsBox:
    enabled: false

# -- cert-manager subchart configuration (jetstack/cert-manager)
# Most clusters have cert-manager pre-installed; enable only if needed
cert-manager:
  # -- Enable cert-manager deployment (disabled by default)
  enabled: false
  # -- Install cert-manager CRDs (required if cert-manager is not already installed)
  crds:
    enabled: true

# -- TLS configuration for platform endpoints
# Works regardless of whether cert-manager was installed by this chart or pre-exists
tls:
  clusterIssuers:
    # -- Create Let's Encrypt ClusterIssuer resources
    create: false
    # -- Email address for Let's Encrypt registration
    email: ""
    # -- Use Let's Encrypt production server (false = staging)
    production: true
  certificates:
    mcp:
      # -- Create Certificate for MCP endpoint (mcp.<global.domain>)
      create: false
      # -- Secret name for MCP TLS certificate
      secretName: mcp-tls
    auth:
      # -- Create Certificate for auth endpoint (auth.<global.domain>)
      create: false
      # -- Secret name for auth TLS certificate
      secretName: auth-tls

# -- Tentacular MCP server subchart configuration
tentacular-mcp:
  # -- Enable MCP server deployment
  enabled: true
  # -- Do not create namespace (managed by umbrella chart)
  namespace:
    create: false
  # -- Auth token for MCP server (must be provided by user or via existingSecret)
  auth:
    token: ""
    existingSecret: ""
  # -- Image configuration
  image:
    registry: ghcr.io
    repository: randybias/tentacular-mcp
    tag: "latest"
    pullPolicy: IfNotPresent
  # -- Service configuration
  service:
    type: ClusterIP
    port: 8080
  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- Name of a Secret to load as environment variables via envFrom.
  # Auto-set to the generated secret name; override when using exoskeleton.existingSecret.
  exoskeleton:
    secretRef: tentacular-exoskeleton-config
  # -- Name of the Secret containing exoskeleton env vars (used by secret template).
  # Auto-set to the generated secret name; override when using exoskeleton.existingSecret.
  exoskeletonSecretName: tentacular-exoskeleton-config
  # -- Extra environment variable sources (e.g., ConfigMaps)
  # The proxy ConfigMap is included by default.
  # optional: true means the pod still starts if the resource doesn't exist
  # (e.g., when esm-sh is disabled).
  extraEnvFrom:
    - configMapRef:
        name: tentacular-proxy-config
        optional: true

# -- Exoskeleton configuration for MCP server
# Controls how backing-service connection details are wired to the MCP server
exoskeleton:
  # -- Enable exoskeleton subsystem
  enabled: true
  # -- Use an existing Secret instead of the auto-generated one.
  # When set, the chart will not create the tentacular-exoskeleton-config Secret.
  # You must also set both tentacular-mcp.exoskeletonSecretName and
  # tentacular-mcp.exoskeleton.secretRef to your secret name.
  existingSecret: ""
  # -- PostgreSQL SSL mode for tentacle connections
  postgresSSLMode: "prefer"
  # -- Delete backing-service data on undeploy
  cleanupOnUndeploy: false
  spire:
    # -- Enable SPIRE workload identity for exoskeleton
    enabled: false
    # -- SPIRE class name for ClusterSPIFFEID resources
    className: "tentacular-system-spire"
  nats:
    # -- External NATS URL (used when nats.enabled=false to point at an external NATS deployment).
    # When nats.enabled=true, this is ignored and the bundled NATS URL is auto-generated.
    url: ""
    # -- NATS auth token for external NATS (used when nats.enabled=false and spiffeEnabled=false).
    # When nats.enabled=true, the token is read from nats.config.merge.authorization.token instead.
    token: ""
    # -- Enable NATS SPIFFE mTLS authentication
    spiffeEnabled: false
    # -- Name of the NATS authorization ConfigMap
    authzConfigMap: "nats-tentacular-authz"
    # -- Namespace of the NATS authorization ConfigMap
    authzNamespace: "tentacular-exoskeleton"
  rustfs:
    # -- RustFS endpoint URL (used in exoskeleton secret when rustfs.enabled)
    endpoint: ""
    # -- RustFS access key
    accessKey: ""
    # -- RustFS secret key
    secretKey: ""
    # -- RustFS bucket name
    bucket: "tentacular"
    # -- RustFS region
    region: "us-east-1"

# -- Exoskeleton SSO/OIDC authentication configuration
exoskeletonAuth:
  # -- Enable OIDC authentication (Keycloak SSO)
  enabled: false
  # -- Keycloak realm issuer URL
  issuerURL: ""
  # -- OIDC client ID
  clientID: ""
  # -- OIDC client secret
  clientSecret: ""

# -- esm-sh module proxy configuration
esm-sh:
  # -- Enable esm-sh proxy deployment
  enabled: true
  image:
    # -- esm-sh container image repository
    repository: ghcr.io/esm-dev/esm.sh
    # -- esm-sh container image tag
    tag: "v136"
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Number of replicas
  replicas: 1
  # -- Resource requests and limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # -- Enable persistent storage for module cache
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""

# -- Ingress configuration
ingress:
  # -- Ingress mode: none, nodeport, ingress, istio, alb-istio
  # none: no external exposure, use kubectl port-forward
  # nodeport: expose MCP via NodePort for simple/test deployments
  # ingress: standard Kubernetes Ingress (Traefik, nginx, or AWS ALB)
  # istio: Istio Gateway + VirtualService
  # alb-istio: AWS ALB fronting Istio
  mode: none
  # -- MCP endpoint configuration
  mcp:
    # -- Hostname for MCP endpoint (e.g., mcp.example.com)
    hostname: ""
  # -- Auth endpoint configuration (optional second endpoint)
  auth:
    # -- Enable auth endpoint routing
    enabled: false
    # -- Hostname for auth endpoint (e.g., auth.example.com)
    hostname: ""
  # -- TLS configuration for ingress
  tls:
    # -- Enable TLS termination
    enabled: false
    # -- TLS secret name (if not using cert-manager)
    secretName: ""
  # -- Ingress class name (for ingress mode: traefik, nginx, alb)
  className: ""
  # -- Freeform annotations for the Ingress resource
  # Useful for ALB-specific annotations like:
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
  annotations: {}
  # -- Istio-specific configuration (for istio and alb-istio modes)
  istio:
    gateway:
      # -- Gateway resource name
      name: tentacular-gateway
      # -- Gateway server configuration (ports, hosts, TLS)
      servers: []
  # -- NodePort configuration (for nodeport mode)
  nodeport:
    # -- NodePort number for MCP service (30000-32767)
    mcp: 30080

# -- Future components (disabled placeholders)

# -- RustFS object storage (S3-compatible)
rustfs:
  # -- Enable RustFS deployment (not yet implemented)
  enabled: false

# -- Keycloak identity and access management
keycloak:
  # -- Enable Keycloak deployment (not yet implemented)
  enabled: false

# -- SPIRE workload identity
spire:
  # -- Enable SPIRE deployment (not yet implemented)
  enabled: false
