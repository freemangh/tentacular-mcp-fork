{{- if (index .Values "esm-sh" "enabled") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-esm-sh
  namespace: {{ include "tentacular-platform.namespace.support" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: esm-sh
spec:
  replicas: {{ index .Values "esm-sh" "replicas" }}
  selector:
    matchLabels:
      {{- include "tentacular-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: esm-sh
  template:
    metadata:
      labels:
        {{- include "tentacular-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: esm-sh
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: esm-sh
          image: "{{ index .Values "esm-sh" "image" "repository" }}:{{ index .Values "esm-sh" "image" "tag" }}"
          imagePullPolicy: {{ index .Values "esm-sh" "image" "pullPolicy" }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml (index .Values "esm-sh" "resources") | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        {{- if (index .Values "esm-sh" "persistence" "enabled") }}
        - name: cache
          persistentVolumeClaim:
            claimName: {{ include "tentacular-platform.fullname" . }}-esm-sh-cache
        {{- else }}
        - name: cache
          emptyDir: {}
        {{- end }}
{{- end }}
