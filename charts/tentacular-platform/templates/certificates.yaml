{{/*
Certificate resources for platform endpoints.
Works regardless of whether cert-manager was installed by this chart or pre-exists.
Requires cert-manager CRDs to be present in the cluster.
*/}}
{{- $issuerName := "" }}
{{- if .Values.tls.clusterIssuers.production }}
{{- $issuerName = printf "%s-letsencrypt-production" (include "tentacular-platform.fullname" .) }}
{{- else }}
{{- $issuerName = printf "%s-letsencrypt-staging" (include "tentacular-platform.fullname" .) }}
{{- end }}
{{- if .Values.tls.certificates.mcp.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-mcp
  namespace: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.certificates.mcp.secretName }}
  issuerRef:
    name: {{ $issuerName }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.mcp.hostname | default (printf "tentacular-mcp.%s" .Values.global.domain) }}
{{- end }}
{{- if and .Values.tls.certificates.mcp.create .Values.tls.certificates.auth.create }}
---
{{- end }}
{{- if .Values.tls.certificates.auth.create }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-auth
  namespace: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.certificates.auth.secretName }}
  issuerRef:
    name: {{ $issuerName }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.auth.hostname | default (printf "tentacular-auth.%s" .Values.global.domain) }}
{{- end }}
{{- if and .Values.keycloak.enabled .Values.ingress.tls.enabled .Values.tls.clusterIssuers.create }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-keycloak
  namespace: {{ include "tentacular-platform.namespace.exoskeleton" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  secretName: tentacular-keycloak-tls
  issuerRef:
    name: {{ $issuerName }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.keycloak.hostname | default (printf "tentacular-keycloak.%s" .Values.global.domain) }}
{{- end }}
