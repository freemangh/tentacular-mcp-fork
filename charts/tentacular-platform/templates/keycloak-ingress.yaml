{{/*
Keycloak Ingress: exposes the Keycloak admin console and OIDC endpoints.
Created when keycloak is enabled and ingress mode is "ingress".
Uses the same ingress class and controller as the MCP ingress.
*/}}
{{- if and .Values.keycloak.enabled .Values.keycloak.ingress.enabled (eq .Values.ingress.mode "ingress") }}
{{- $kcHost := .Values.keycloak.hostname | default (printf "tentacular-keycloak.%s" .Values.global.domain) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-keycloak
  namespace: {{ include "tentacular-platform.namespace.exoskeleton" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-ingress
  annotations:
    {{- if .Values.ingress.annotations }}
    {{- /* Inherit platform annotations but exclude MCP-specific ones */ -}}
    {{- range $key, $val := .Values.ingress.annotations }}
    {{- if not (hasPrefix "nginx.ingress.kubernetes.io/upstream-hash-by" $key) }}
    {{ $key }}: {{ $val | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $kcHost }}
      secretName: tentacular-keycloak-tls
  {{- end }}
  rules:
    - host: {{ $kcHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keycloakx-http
                port:
                  number: 80
{{- end }}
