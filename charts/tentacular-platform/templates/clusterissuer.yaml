{{/*
Let's Encrypt ClusterIssuer resources.
Works regardless of whether cert-manager was installed by this chart or pre-exists.
Requires cert-manager CRDs to be present in the cluster.
*/}}
{{- if .Values.tls.clusterIssuers.create }}
{{- if .Values.tls.clusterIssuers.production }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-letsencrypt-production
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ required "tls.clusterIssuers.email is required when tls.clusterIssuers.create is true" .Values.tls.clusterIssuers.email }}
    privateKeySecretRef:
      name: {{ include "tentacular-platform.fullname" . }}-letsencrypt-production
    solvers:
      - http01:
          ingress: {}
{{- end }}
{{- if not .Values.tls.clusterIssuers.production }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "tentacular-platform.fullname" . }}-letsencrypt-staging
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ required "tls.clusterIssuers.email is required when tls.clusterIssuers.create is true" .Values.tls.clusterIssuers.email }}
    privateKeySecretRef:
      name: {{ include "tentacular-platform.fullname" . }}-letsencrypt-staging
    solvers:
      - http01:
          ingress: {}
{{- end }}
{{- end }}
