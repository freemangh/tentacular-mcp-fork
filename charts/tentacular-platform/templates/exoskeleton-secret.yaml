{{/*
Exoskeleton Secret: wires backing-service connection details to the MCP server.
Contains PostgreSQL and NATS credentials derived from subchart configuration.
Keys match the TENTACULAR_* environment variable names the MCP server reads.

The Secret is always rendered when the MCP Deployment references it (via
exoskeletonSecretName) and no existingSecret override is provided. When
exoskeleton is disabled, the Secret simply contains ENABLED=false so the
MCP server starts normally without exoskeleton features.
*/}}
{{- if .Values.exoskeleton.existingSecret }}
  {{- $mcpSecretName := index .Values "tentacular-mcp" "exoskeletonSecretName" -}}
  {{- if ne $mcpSecretName .Values.exoskeleton.existingSecret }}
    {{- fail (printf "Configuration error: exoskeleton.existingSecret is '%s' but tentacular-mcp.exoskeletonSecretName is '%s'. When using exoskeleton.existingSecret, you must also set tentacular-mcp.exoskeletonSecretName to the same value." .Values.exoskeleton.existingSecret $mcpSecretName) }}
  {{- end }}
{{- end }}
{{- $secretName := index .Values "tentacular-mcp" "exoskeletonSecretName" -}}
{{- if and (index .Values "tentacular-mcp" "enabled") $secretName (not .Values.exoskeleton.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    tentacular.io/exoskeleton-config: "true"
type: Opaque
stringData:
  TENTACULAR_EXOSKELETON_ENABLED: {{ .Values.exoskeleton.enabled | quote }}
  {{- if and .Values.exoskeleton.enabled .Values.postgresql.enabled }}
  TENTACULAR_EXOSKELETON_POSTGRES_ENABLED: "true"
  TENTACULAR_POSTGRES_ADMIN_HOST: {{ printf "%s-postgresql.%s.svc.cluster.local" .Release.Name (include "tentacular-platform.namespace.exoskeleton" .) }}
  TENTACULAR_POSTGRES_ADMIN_PORT: "5432"
  TENTACULAR_POSTGRES_ADMIN_DATABASE: {{ .Values.postgresql.auth.database | quote }}
  TENTACULAR_POSTGRES_ADMIN_USER: {{ .Values.postgresql.auth.username | quote }}
  TENTACULAR_POSTGRES_ADMIN_PASSWORD: {{ required "postgresql.auth.password is required when exoskeleton secret is auto-generated. If using postgresql.auth.existingSecret, also set exoskeleton.existingSecret to manage MCP credentials separately" .Values.postgresql.auth.password | quote }}
  TENTACULAR_POSTGRES_ADMIN_SSLMODE: {{ .Values.exoskeleton.postgresSSLMode | quote }}
  {{- end }}
  {{- if and .Values.exoskeleton.enabled .Values.nats.enabled }}
  TENTACULAR_EXOSKELETON_NATS_ENABLED: "true"
  TENTACULAR_NATS_URL: {{ printf "nats://%s-nats.%s.svc.cluster.local:4222" .Release.Name (include "tentacular-platform.namespace.exoskeleton" .) }}
  TENTACULAR_NATS_TOKEN: {{ required "nats.config.merge.authorization.token is required when exoskeleton NATS is enabled. Set the NATS authorization token or provide exoskeleton.existingSecret." (dig "config" "merge" "authorization" "token" "" .Values.nats) | quote }}
  {{- end }}
{{- end }}
