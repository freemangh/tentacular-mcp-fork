{{/*
Exoskeleton Secret: wires backing-service connection details to the MCP server.
Contains PostgreSQL and NATS credentials derived from subchart configuration.
Keys match the TENTACULAR_* environment variable names the MCP server reads.

The Secret is always rendered when the MCP Deployment references it (via
exoskeletonSecretName) and no existingSecret override is provided. When
exoskeleton is disabled, the Secret simply contains ENABLED=false so the
MCP server starts normally without exoskeleton features.
*/}}
{{- if and .Values.exoskeleton.enabled .Values.exoskeleton.nats.spiffeEnabled .Values.nats.enabled }}
  {{- fail "Configuration error: exoskeleton.nats.spiffeEnabled=true is not compatible with the bundled NATS subchart (nats.enabled=true). The bundled NATS uses token-based auth and does not support SPIFFE/mTLS. To use NATS SPIFFE, disable the bundled subchart (nats.enabled=false) and point exoskeleton at an external NATS deployment with SPIFFE support." }}
{{- end }}
{{- if and .Values.exoskeleton.existingSecret (index .Values "tentacular-mcp" "enabled") }}
  {{- $mcpSecretName := index .Values "tentacular-mcp" "exoskeletonSecretName" -}}
  {{- if ne $mcpSecretName .Values.exoskeleton.existingSecret }}
    {{- fail (printf "Configuration error: exoskeleton.existingSecret is '%s' but tentacular-mcp.exoskeletonSecretName is '%s'. When using exoskeleton.existingSecret, you must also set tentacular-mcp.exoskeletonSecretName to the same value." .Values.exoskeleton.existingSecret $mcpSecretName) }}
  {{- end }}
  {{- $mcpSecretRef := (index .Values "tentacular-mcp" "exoskeleton" "secretRef") -}}
  {{- if or (not $mcpSecretRef) (ne $mcpSecretRef .Values.exoskeleton.existingSecret) }}
    {{- fail (printf "Configuration error: exoskeleton.existingSecret is '%s' but tentacular-mcp.exoskeleton.secretRef is '%s'. When using exoskeleton.existingSecret, you must also set tentacular-mcp.exoskeleton.secretRef to the same value." .Values.exoskeleton.existingSecret $mcpSecretRef) }}
  {{- end }}
{{- end }}
{{- $secretName := index .Values "tentacular-mcp" "exoskeletonSecretName" -}}
{{- if and (index .Values "tentacular-mcp" "enabled") $secretName (not .Values.exoskeleton.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    tentacular.io/exoskeleton-config: "true"
type: Opaque
stringData:
  TENTACULAR_EXOSKELETON_ENABLED: {{ .Values.exoskeleton.enabled | quote }}
  {{- if and .Values.exoskeleton.enabled .Values.postgresql.enabled }}
  TENTACULAR_EXOSKELETON_POSTGRES_ENABLED: "true"
  TENTACULAR_POSTGRES_ADMIN_HOST: {{ printf "%s-postgresql.%s.svc.cluster.local" .Release.Name (include "tentacular-platform.namespace.exoskeleton" .) }}
  TENTACULAR_POSTGRES_ADMIN_PORT: "5432"
  TENTACULAR_POSTGRES_ADMIN_DATABASE: {{ .Values.postgresql.auth.database | quote }}
  TENTACULAR_POSTGRES_ADMIN_USER: {{ .Values.postgresql.auth.username | quote }}
  TENTACULAR_POSTGRES_ADMIN_PASSWORD: {{ required "postgresql.auth.password is required when exoskeleton secret is auto-generated. If using postgresql.auth.existingSecret, also set exoskeleton.existingSecret to manage MCP credentials separately" .Values.postgresql.auth.password | quote }}
  TENTACULAR_POSTGRES_SSLMODE: {{ .Values.exoskeleton.postgresSSLMode | quote }}
  {{- end }}
  {{- if and .Values.exoskeleton.enabled .Values.nats.enabled }}
  TENTACULAR_EXOSKELETON_NATS_ENABLED: "true"
  TENTACULAR_NATS_URL: {{ printf "nats://%s-nats.%s.svc.cluster.local:4222" .Release.Name (include "tentacular-platform.namespace.exoskeleton" .) }}
  {{- if not .Values.exoskeleton.nats.spiffeEnabled }}
  TENTACULAR_NATS_TOKEN: {{ required "nats.config.merge.authorization.token is required when exoskeleton NATS is enabled without SPIFFE. Set the NATS authorization token, enable exoskeleton.nats.spiffeEnabled, or provide exoskeleton.existingSecret." (dig "config" "merge" "authorization" "token" "" .Values.nats) | quote }}
  {{- end }}
  {{- else if and .Values.exoskeleton.enabled .Values.exoskeleton.nats.url }}
  {{- /* External NATS: bundled NATS is disabled but an external URL is provided */}}
  TENTACULAR_EXOSKELETON_NATS_ENABLED: "true"
  TENTACULAR_NATS_URL: {{ .Values.exoskeleton.nats.url | quote }}
  {{- if not .Values.exoskeleton.nats.spiffeEnabled }}
  TENTACULAR_NATS_TOKEN: {{ required "exoskeleton.nats.token is required when using external NATS without SPIFFE (nats.enabled=false, exoskeleton.nats.spiffeEnabled=false). Set exoskeleton.nats.token, enable exoskeleton.nats.spiffeEnabled, or provide exoskeleton.existingSecret." .Values.exoskeleton.nats.token | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.exoskeleton.enabled }}
  TENTACULAR_EXOSKELETON_CLEANUP_ON_UNDEPLOY: {{ .Values.exoskeleton.cleanupOnUndeploy | quote }}
  {{- if .Values.exoskeleton.spire.enabled }}
  TENTACULAR_EXOSKELETON_SPIRE_ENABLED: "true"
  TENTACULAR_SPIRE_CLASS_NAME: {{ .Values.exoskeleton.spire.className | quote }}
  {{- end }}
  {{- if .Values.exoskeleton.nats.spiffeEnabled }}
  TENTACULAR_NATS_SPIFFE_ENABLED: "true"
  TENTACULAR_NATS_AUTHZ_CONFIGMAP: {{ .Values.exoskeleton.nats.authzConfigMap | quote }}
  TENTACULAR_NATS_AUTHZ_NAMESPACE: {{ .Values.exoskeleton.nats.authzNamespace | quote }}
  {{- end }}
  {{- if .Values.rustfs.enabled }}
  TENTACULAR_RUSTFS_ENDPOINT: {{ .Values.exoskeleton.rustfs.endpoint | quote }}
  TENTACULAR_RUSTFS_ACCESS_KEY: {{ .Values.exoskeleton.rustfs.accessKey | quote }}
  TENTACULAR_RUSTFS_SECRET_KEY: {{ .Values.exoskeleton.rustfs.secretKey | quote }}
  TENTACULAR_RUSTFS_BUCKET: {{ .Values.exoskeleton.rustfs.bucket | default "tentacular" | quote }}
  TENTACULAR_RUSTFS_REGION: {{ .Values.exoskeleton.rustfs.region | default "us-east-1" | quote }}
  {{- end }}
  {{- if .Values.exoskeletonAuth.enabled }}
  TENTACULAR_EXOSKELETON_AUTH_ENABLED: "true"
  TENTACULAR_KEYCLOAK_ISSUER: {{ .Values.exoskeletonAuth.issuerURL | quote }}
  TENTACULAR_KEYCLOAK_CLIENT_ID: {{ .Values.exoskeletonAuth.clientID | quote }}
  TENTACULAR_KEYCLOAK_CLIENT_SECRET: {{ .Values.exoskeletonAuth.clientSecret | quote }}
  {{- end }}
  {{- end }}
{{- end }}
