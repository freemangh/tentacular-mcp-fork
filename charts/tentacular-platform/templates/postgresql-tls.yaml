{{/*
PostgreSQL TLS certificates via cert-manager.
Uses a self-signed Issuer for internal cluster traffic.
Bitnami PostgreSQL reads certs from the Secret created by cert-manager.
*/}}
{{- if and .Values.postgresql.enabled .Values.postgresql.tls.enabled (not .Values.postgresql.tls.autoGenerated) .Values.postgresql.tls.certificatesSecret }}
{{- $pgFullname := printf "%s-postgresql" .Release.Name }}
{{- $exoNs := include "tentacular-platform.namespace.exoskeleton" . }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ $pgFullname }}-selfsigned
  namespace: {{ $exoNs }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $pgFullname }}-tls
  namespace: {{ $exoNs }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.postgresql.tls.certificatesSecret }}
  issuerRef:
    name: {{ $pgFullname }}-selfsigned
    kind: Issuer
  commonName: {{ $pgFullname }}
  dnsNames:
    - {{ $pgFullname }}
    - {{ printf "%s.%s" $pgFullname $exoNs }}
    - {{ printf "%s.%s.svc" $pgFullname $exoNs }}
    - {{ printf "%s.%s.svc.cluster.local" $pgFullname $exoNs }}
  duration: 8760h
  renewBefore: 720h
{{- end }}
