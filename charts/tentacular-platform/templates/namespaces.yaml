{{- if .Values.namespaces.system.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    tentacular.io/system: "true"
---
{{- end }}
{{- if .Values.namespaces.exoskeleton.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "tentacular-platform.namespace.exoskeleton" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
  annotations:
    tentacular.io/system: "true"
---
{{- end }}
{{- if .Values.namespaces.support.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ include "tentacular-platform.namespace.support" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
  annotations:
    tentacular.io/system: "true"
{{- end }}
