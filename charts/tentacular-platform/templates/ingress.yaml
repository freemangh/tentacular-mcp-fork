{{- if eq .Values.ingress.mode "ingress" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tentacular-platform.fullname" . }}
  namespace: {{ include "tentacular-platform.namespace.system" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.mcp.hostname | default (printf "mcp.%s" .Values.global.domain) }}
        {{- if .Values.ingress.auth.enabled }}
        - {{ .Values.ingress.auth.hostname | default (printf "auth.%s" .Values.global.domain) }}
        {{- end }}
      secretName: {{ .Values.ingress.tls.secretName | default "tentacular-tls" }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.mcp.hostname | default (printf "mcp.%s" .Values.global.domain) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-tentacular-mcp
                port:
                  number: 8080
    {{- if .Values.ingress.auth.enabled }}
    - host: {{ .Values.ingress.auth.hostname | default (printf "auth.%s" .Values.global.domain) }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-tentacular-mcp
                port:
                  number: 8080
    {{- end }}
{{- end }}
