{{/*
Keycloak admin credentials Secret.
Bootstraps the admin user on first Keycloak startup via KEYCLOAK_ADMIN env vars.
Referenced by keycloakx.extraEnvFrom in values.yaml.
*/}}
{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: tentacular-keycloak-admin
  namespace: {{ include "tentacular-platform.namespace.exoskeleton" . }}
  labels:
    {{- include "tentacular-platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEYCLOAK_ADMIN: {{ .Values.keycloak.admin.user | default "admin" | quote }}
  KEYCLOAK_ADMIN_PASSWORD: {{ required "keycloak.admin.password is required when keycloak is enabled" .Values.keycloak.admin.password | quote }}
{{- end }}
