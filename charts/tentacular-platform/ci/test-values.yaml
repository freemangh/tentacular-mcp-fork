# CI test values - minimal overrides for automated testing
global:
  domain: test.tentacular.local

namespaces:
  system:
    create: true
    name: tentacular-system
  exoskeleton:
    create: true
    name: tentacular-exoskeleton
  support:
    create: true
    name: tentacular-support

networkPolicies:
  enabled: true

postgresql:
  enabled: true
  auth:
    password: test-postgres-password

nats:
  enabled: true
  config:
    merge:
      authorization:
        token: "test-nats-token"

cert-manager:
  enabled: false

tls:
  clusterIssuers:
    create: false
  certificates:
    mcp:
      create: false
    auth:
      create: false

tentacular-mcp:
  enabled: true
  namespace:
    create: false
  auth:
    token: "test-mcp-auth-token"
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi
  exoskeletonSecretName: tentacular-exoskeleton-config
  extraEnvFrom:
    - configMapRef:
        name: tentacular-proxy-config
        optional: true

exoskeleton:
  enabled: true
  postgresSSLMode: "disable"

esm-sh:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 125m
      memory: 128Mi

ingress:
  mode: none

rustfs:
  enabled: false

keycloak:
  enabled: false

spire:
  enabled: false
