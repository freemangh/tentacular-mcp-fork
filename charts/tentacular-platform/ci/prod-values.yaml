# Production profile - cloud-agnostic, works with any K8s cluster
# Usage: helm install tentacular charts/tentacular-platform/ \
#   -f charts/tentacular-platform/ci/prod-values.yaml \
#   -n tentacular-system --create-namespace \
#   --set postgresql.auth.password=<secret> \
#   --set nats.config.merge.authorization.token=<secret> \
#   --set tentacular-mcp.auth.token=<secret> \
#   --set keycloak.admin.password=<secret> \
#   --set keycloakx.database.password=<secret> \
#   --set exoskeletonAuth.clientSecret=<secret>
#
# NOTE: Replace all CHANGE-ME placeholder values before deploying.
# In production, use --set or external secret management (e.g., Sealed Secrets,
# External Secrets Operator) instead of plaintext values in this file.
#
# Prerequisites:
#   1. nginx ingress controller installed
#   2. cert-manager installed (for TLS via Let's Encrypt)
#   3. Default StorageClass available
#   4. DNS records pointing to the ingress controller:
#      - tentacular-mcp.<domain>
#      - tentacular-keycloak.<domain>
global:
  domain: tentacular.example.com
  # Allow non-Bitnami images for init containers (Bitnami images are
  # behind Broadcom paywall since Aug 2025).
  security:
    allowInsecureImages: true

namespaces:
  system:
    create: true
  exoskeleton:
    create: true
  support:
    create: true

networkPolicies:
  enabled: true

postgresql:
  enabled: true
  image:
    # Bitnami removed versioned tags; use latest until chart is updated
    tag: latest
  auth:
    # CHANGE: Use existingSecret in production instead of plaintext password
    password: "CHANGE-ME-use-existing-secret"
  tls:
    # TLS for PostgreSQL connections using cert-manager self-signed certificates.
    # cert-manager creates the Secret; Bitnami PostgreSQL mounts it.
    # NOTE: Do not use autoGenerated=true — the Bitnami init image
    # (bitnami/os-shell) is behind Broadcom's paywall since Aug 2025.
    enabled: true
    autoGenerated: false
    certificatesSecret: tentacular-postgresql-tls
    certFilename: tls.crt
    certKeyFilename: tls.key
    # certCAFilename omitted — do not require client certificates.
    # Server-side TLS encrypts the connection; clients authenticate via password.
  # Override Bitnami init container image (os-shell is behind Broadcom paywall)
  volumePermissions:
    image:
      registry: docker.io
      repository: alpine
      tag: "3.21"
  primary:
    persistence:
      size: 20Gi
      # storageClass omitted → uses cluster default

nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        dir: /data
        pvc:
          enabled: true
          size: 5Gi
          # storageClassName omitted → uses cluster default
    merge:
      authorization:
        # CHANGE: Use a strong token in production
        token: "CHANGE-ME-strong-nats-token"

# cert-manager: assumes pre-installed in production clusters.
cert-manager:
  enabled: false

tls:
  clusterIssuers:
    create: true
    # CHANGE: Set your email for Let's Encrypt registration
    email: admin@example.com
    production: true
  certificates:
    mcp:
      create: true
      secretName: tentacular-mcp-tls
    auth:
      create: false

tentacular-mcp:
  enabled: true
  namespace:
    create: false
  auth:
    # CHANGE: Use a strong token in production
    token: "CHANGE-ME-strong-mcp-token"
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  exoskeletonSecretName: tentacular-exoskeleton-config
  extraEnvFrom:
    - configMapRef:
        name: tentacular-proxy-config
        optional: true

exoskeleton:
  enabled: true
  postgresSSLMode: "require"

# Keycloak OIDC authentication for deployer identity.
# issuerURL is auto-derived from the bundled Keycloak when keycloak.enabled=true.
exoskeletonAuth:
  enabled: true
  clientID: "tentacular-mcp"
  # CHANGE: Set your OIDC client secret (configure in Keycloak admin console)
  clientSecret: "CHANGE-ME-keycloak-client-secret"

# Keycloak deployment (codecentric/keycloakx subchart)
keycloak:
  enabled: true
  realm: tentacular
  admin:
    user: admin
    # CHANGE: Use a strong admin password
    password: "CHANGE-ME-keycloak-admin"
  hostname: tentacular-keycloak.tentacular.example.com
  ingress:
    enabled: true

keycloakx:
  replicas: 1
  database:
    vendor: postgres
    database: keycloak
    username: keycloak
    # CHANGE: Must match the password used in postgres-init
    password: "CHANGE-ME-keycloak-db-password"

esm-sh:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  mode: ingress
  className: nginx
  controllerNamespace: ingress-nginx
  mcp:
    hostname: tentacular-mcp.tentacular.example.com
  tls:
    enabled: true
    secretName: tentacular-mcp-tls
  # nginx session affinity: routes requests with the same Mcp-Session-Id
  # header to the same MCP pod. Required for multi-replica MCP deployments
  # using MCP Streamable HTTP transport.
  annotations:
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_mcp_session_id"
