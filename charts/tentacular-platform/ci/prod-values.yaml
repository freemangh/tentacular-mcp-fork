# Production profile - standard Kubernetes Ingress with TLS
# Usage: helm install tentacular charts/tentacular-platform/ \
#   -f charts/tentacular-platform/ci/prod-values.yaml \
#   -n tentacular-system --create-namespace
# NOTE: Replace placeholder values (domain, auth token, passwords) before deploying
global:
  domain: tentacular.example.com

namespaces:
  system:
    create: true
  exoskeleton:
    create: true
  support:
    create: true

networkPolicies:
  enabled: true

postgresql:
  enabled: true
  image:
    # Bitnami removed versioned tags; use latest until chart is updated
    tag: latest
  auth:
    # CHANGE: Use existingSecret in production instead of plaintext password
    password: "CHANGE-ME-use-existing-secret"
  primary:
    persistence:
      size: 20Gi

nats:
  enabled: true
  config:
    merge:
      authorization:
        # CHANGE: Use a strong token in production
        token: "CHANGE-ME-strong-nats-token"

# cert-manager: assumes pre-installed in production clusters.
# To install via this chart, enable cert-manager first in a separate release
# or run `helm install` once with tls.clusterIssuers.create=false and
# tls.certificates.mcp.create=false, then `helm upgrade` to enable them.
cert-manager:
  enabled: false

tls:
  clusterIssuers:
    create: true
    email: admin@example.com
    production: true
  certificates:
    mcp:
      create: true
      secretName: mcp-tls
    auth:
      create: false

tentacular-mcp:
  enabled: true
  namespace:
    create: false
  auth:
    # CHANGE: Use a strong token in production
    token: "CHANGE-ME-strong-mcp-token"
  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  exoskeletonSecretName: tentacular-exoskeleton-config
  extraEnvFrom:
    - configMapRef:
        name: tentacular-proxy-config
        optional: true

exoskeleton:
  enabled: true
  # Requires PostgreSQL TLS to be configured. Set to "disable" for test
  # clusters without TLS, or "prefer" to use TLS when available.
  postgresSSLMode: "require"

esm-sh:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  mode: ingress
  className: nginx
  mcp:
    hostname: mcp.tentacular.example.com
  tls:
    enabled: true
    secretName: mcp-tls
  annotations: {}
