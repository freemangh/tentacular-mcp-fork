# AWS production profile - K8s on EC2 with nginx ingress + NLB
# Usage: helm install tentacular charts/tentacular-platform/ \
#   -f charts/tentacular-platform/ci/prod-values.yaml \
#   -f charts/tentacular-platform/ci/aws-values.yaml \
#   -n tentacular-system --create-namespace \
#   --set global.domain=<your-domain> \
#   --set tls.clusterIssuers.email=admin@<your-domain> \
#   --set postgresql.auth.password="$(openssl rand -hex 16)" \
#   --set nats.config.merge.authorization.token="$(openssl rand -hex 16)" \
#   --set tentacular-mcp.auth.token="$(openssl rand -hex 32)" \
#   --set keycloak.admin.password="$(openssl rand -hex 16)" \
#   --set keycloakx.database.password="$(openssl rand -hex 16)" \
#   --set exoskeletonAuth.clientSecret="$(openssl rand -hex 32)"
#
# This file is meant to be layered ON TOP of prod-values.yaml.
# It overrides only the AWS-specific settings.
# Hostnames are auto-derived from global.domain:
#   - tentacular-mcp.<domain>
#   - tentacular-keycloak.<domain>
#
# Prerequisites:
#   1. nginx ingress controller with NLB:
#      helm install ingress-nginx ingress-nginx/ingress-nginx \
#        -n ingress-nginx --create-namespace \
#        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
#        --set controller.service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-scheme"=internet-facing
#   2. cert-manager installed
#   3. Default StorageClass set (e.g., ebs-csi-default-sc)
#   4. DNS records pointing to the NLB:
#      - tentacular-mcp.<your-domain>
#      - tentacular-keycloak.<your-domain>

# All hostnames are derived from global.domain (set via --set global.domain=<your-domain>)
# No explicit hostname overrides needed in this file.

tls:
  clusterIssuers:
    create: true
    # Set via --set tls.clusterIssuers.email=admin@<your-domain>
    production: true
  certificates:
    mcp:
      create: true
      secretName: tentacular-mcp-tls

ingress:
  tls:
    enabled: true
    secretName: tentacular-mcp-tls
