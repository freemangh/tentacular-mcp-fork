# -- Number of pod replicas
replicaCount: 1

image:
  # -- Container image registry
  registry: ghcr.io
  # -- Container image repository
  repository: randybias/tentacular-mcp
  # -- Container image tag
  tag: "latest"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the release name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""
# -- Override the namespace for all resources (used by umbrella charts)
namespaceOverride: ""

namespace:
  # -- Create the namespace resource
  create: true

serviceAccount:
  # -- Create the ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}

rbac:
  # -- Create the ClusterRole and ClusterRoleBinding
  create: true

auth:
  # -- Name of an existing Secret containing the auth token (key must be "token").
  # If set, the chart will not create its own Secret.
  existingSecret: ""
  # -- Auth token value. Used only when existingSecret is empty.
  # Generate with: openssl rand -hex 32
  token: ""

service:
  # -- Service type (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # -- Service port
  port: 8080
  # -- NodePort (only used when type is NodePort)
  nodePort: ""
  # -- Additional annotations for the Service
  annotations: {}

deployment:
  # -- Deployment strategy
  strategy:
    type: RollingUpdate
  # -- Additional annotations for the Deployment
  annotations: {}
  # -- Additional annotations for the pod template
  podAnnotations: {}

# -- Resource requests and limits
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context
securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Extra environment variable sources (e.g., ConfigMaps) to add to the pod via envFrom.
extraEnvFrom: []

# -- Exoskeleton SSO/OIDC authentication configuration.
exoskeletonAuth:
  # -- Enable OIDC authentication (Keycloak SSO)
  enabled: false
  # -- Keycloak realm issuer URL (internal cluster URL preferred)
  issuerURL: ""
  # -- OIDC client ID
  clientID: ""
  # -- OIDC client secret (used only when existingSecret is empty)
  clientSecret: ""
  # -- Name of an existing Secret containing Keycloak credentials.
  # Required keys: issuer-url, client-id, client-secret.
  existingSecret: ""

# -- Exoskeleton configuration for backing-service registration.
exoskeleton:
  # -- Enable the exoskeleton control plane
  enabled: false
  # -- Name of a Secret to load as environment variables via envFrom.
  # When set, per-service env var blocks are skipped.
  # Used by tentacular-platform umbrella chart.
  secretRef: ""
  # -- Delete backing-service data on undeploy
  cleanupOnUndeploy: false
  postgres:
    # -- Name of an existing Secret containing Postgres admin credentials.
    # Required keys: host, port, database, user, password.
    existingSecret: ""
    # -- Inline Postgres admin credentials (used only when existingSecret is empty)
    host: ""
    port: "5432"
    database: "tentacular"
    user: ""
    password: ""
    # -- Postgres SSL mode (disable, require, verify-ca, verify-full)
    sslMode: "disable"
  nats:
    # -- Name of an existing Secret containing NATS credentials.
    # Required keys: url, token.
    existingSecret: ""
    # -- Inline NATS credentials (used only when existingSecret is empty)
    url: ""
    token: ""
    # -- Enable NATS SPIFFE mTLS authentication
    spiffeEnabled: false
    # -- Name of the NATS authorization ConfigMap
    authzConfigMap: "nats-tentacular-authz"
    # -- Namespace of the NATS authorization ConfigMap
    authzNamespace: "tentacular-exoskeleton"
  spire:
    # -- Enable SPIRE workload identity
    enabled: false
    # -- SPIRE class name for ClusterSPIFFEID resources
    className: "tentacular-system-spire"
  rustfs:
    # -- Name of an existing Secret containing RustFS admin credentials.
    # Required keys: endpoint, access_key, secret_key, bucket, region.
    existingSecret: ""
    # -- Inline RustFS admin credentials (used only when existingSecret is empty)
    endpoint: ""
    accessKey: ""
    secretKey: ""
    bucket: "tentacular"
    region: "us-east-1"
