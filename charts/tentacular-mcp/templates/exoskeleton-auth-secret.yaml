{{- if and .Values.exoskeletonAuth.enabled .Values.exoskeletonAuth.clientSecret (not .Values.exoskeletonAuth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton-auth
  namespace: {{ include "tentacular-mcp.namespace" . }}
  labels:
    {{- include "tentacular-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: exoskeleton-auth
type: Opaque
stringData:
  client-secret: {{ .Values.exoskeletonAuth.clientSecret | quote }}
{{- end }}
