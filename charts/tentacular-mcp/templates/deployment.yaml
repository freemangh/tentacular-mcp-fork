apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tentacular-mcp.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tentacular-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.deployment.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tentacular-mcp.selectorLabels" . | nindent 6 }}
  {{- with .Values.deployment.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "tentacular-mcp.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
      {{- with .Values.deployment.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "tentacular-mcp.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "tentacular-mcp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TOKEN_PATH
              value: /etc/tentacular-mcp/token
            {{- if .Values.exoskeleton.enabled }}
            - name: TENTACULAR_EXOSKELETON_ENABLED
              value: "true"
            - name: TENTACULAR_EXOSKELETON_CLEANUP_ON_UNDEPLOY
              value: {{ .Values.exoskeleton.cleanupOnUndeploy | quote }}
            {{- if .Values.exoskeleton.postgres.existingSecret }}
            - name: TENTACULAR_POSTGRES_ADMIN_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.postgres.existingSecret }}
                  key: host
            - name: TENTACULAR_POSTGRES_ADMIN_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.postgres.existingSecret }}
                  key: port
            - name: TENTACULAR_POSTGRES_ADMIN_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.postgres.existingSecret }}
                  key: database
            - name: TENTACULAR_POSTGRES_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.postgres.existingSecret }}
                  key: user
            - name: TENTACULAR_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.postgres.existingSecret }}
                  key: password
            - name: TENTACULAR_POSTGRES_SSLMODE
              value: {{ .Values.exoskeleton.postgres.sslMode | default "disable" | quote }}
            {{- else if .Values.exoskeleton.postgres.host }}
            - name: TENTACULAR_POSTGRES_ADMIN_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: postgres-host
            - name: TENTACULAR_POSTGRES_ADMIN_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: postgres-port
            - name: TENTACULAR_POSTGRES_ADMIN_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: postgres-database
            - name: TENTACULAR_POSTGRES_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: postgres-user
            - name: TENTACULAR_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: postgres-password
            - name: TENTACULAR_POSTGRES_SSLMODE
              value: {{ .Values.exoskeleton.postgres.sslMode | default "disable" | quote }}
            {{- end }}
            {{- if .Values.exoskeleton.nats.existingSecret }}
            - name: TENTACULAR_NATS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.nats.existingSecret }}
                  key: url
            - name: TENTACULAR_NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.nats.existingSecret }}
                  key: token
            {{- else if .Values.exoskeleton.nats.url }}
            - name: TENTACULAR_NATS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: nats-url
            - name: TENTACULAR_NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: nats-token
            {{- end }}
            {{- if .Values.exoskeleton.rustfs.existingSecret }}
            - name: TENTACULAR_RUSTFS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.rustfs.existingSecret }}
                  key: endpoint
            - name: TENTACULAR_RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.rustfs.existingSecret }}
                  key: access_key
            - name: TENTACULAR_RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.rustfs.existingSecret }}
                  key: secret_key
            - name: TENTACULAR_RUSTFS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.rustfs.existingSecret }}
                  key: bucket
            - name: TENTACULAR_RUSTFS_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.exoskeleton.rustfs.existingSecret }}
                  key: region
            {{- else if .Values.exoskeleton.rustfs.endpoint }}
            - name: TENTACULAR_RUSTFS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: rustfs-endpoint
            - name: TENTACULAR_RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: rustfs-access-key
            - name: TENTACULAR_RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: rustfs-secret-key
            - name: TENTACULAR_RUSTFS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: rustfs-bucket
            - name: TENTACULAR_RUSTFS_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
                  key: rustfs-region
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: auth-secret
              mountPath: /etc/tentacular-mcp
              readOnly: true
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: auth-secret
          secret:
            secretName: {{ include "tentacular-mcp.authSecretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
