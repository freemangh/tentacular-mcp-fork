{{- if not .Values.auth.existingSecret }}
{{- if not .Values.auth.token }}
{{- fail "auth.token is required when auth.existingSecret is not set. Generate one with: openssl rand -hex 32" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tentacular-mcp.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tentacular-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.auth.token | quote }}
{{- end }}
