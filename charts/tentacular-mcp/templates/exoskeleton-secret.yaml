{{- if .Values.exoskeleton.enabled }}
{{- $needsSecret := false }}
{{- if and .Values.exoskeleton.postgres.host (not .Values.exoskeleton.postgres.existingSecret) }}
  {{- $needsSecret = true }}
{{- end }}
{{- if and .Values.exoskeleton.nats.url (not .Values.exoskeleton.nats.existingSecret) }}
  {{- $needsSecret = true }}
{{- end }}
{{- if and .Values.exoskeleton.rustfs.endpoint (not .Values.exoskeleton.rustfs.existingSecret) }}
  {{- $needsSecret = true }}
{{- end }}
{{- if $needsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tentacular-mcp.fullname" . }}-exoskeleton
  namespace: {{ include "tentacular-mcp.namespace" . }}
  labels:
    {{- include "tentacular-mcp.labels" . | nindent 4 }}
    app.kubernetes.io/component: exoskeleton
type: Opaque
stringData:
  {{- if and .Values.exoskeleton.postgres.host (not .Values.exoskeleton.postgres.existingSecret) }}
  postgres-host: {{ .Values.exoskeleton.postgres.host | quote }}
  postgres-port: {{ .Values.exoskeleton.postgres.port | quote }}
  postgres-database: {{ .Values.exoskeleton.postgres.database | quote }}
  postgres-user: {{ .Values.exoskeleton.postgres.user | quote }}
  postgres-password: {{ .Values.exoskeleton.postgres.password | quote }}
  {{- end }}
  {{- if and .Values.exoskeleton.nats.url (not .Values.exoskeleton.nats.existingSecret) }}
  nats-url: {{ .Values.exoskeleton.nats.url | quote }}
  nats-token: {{ .Values.exoskeleton.nats.token | quote }}
  {{- end }}
  {{- if and .Values.exoskeleton.rustfs.endpoint (not .Values.exoskeleton.rustfs.existingSecret) }}
  rustfs-endpoint: {{ .Values.exoskeleton.rustfs.endpoint | quote }}
  rustfs-access-key: {{ .Values.exoskeleton.rustfs.accessKey | quote }}
  rustfs-secret-key: {{ .Values.exoskeleton.rustfs.secretKey | quote }}
  rustfs-bucket: {{ .Values.exoskeleton.rustfs.bucket | quote }}
  rustfs-region: {{ .Values.exoskeleton.rustfs.region | quote }}
  {{- end }}
{{- end }}
{{- end }}
