name: Docker Build

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to ghcr.io"
        type: boolean
        default: true
      platforms:
        description: "Target platforms"
        type: choice
        default: "multi"
        options:
          - multi
          - amd64-only

  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Resolve platforms
        id: platforms
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.platforms }}" == "amd64-only" ]]; then
            echo "platforms=linux/amd64" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve push
        id: push
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "push=${{ inputs.push_image }}" >> "$GITHUB_OUTPUT"
          else
            echo "push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: ${{ steps.push.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=registry,ref=ghcr.io/randybias/tentacular-mcp:buildcache
          cache-to: type=registry,ref=ghcr.io/randybias/tentacular-mcp:buildcache,mode=max
